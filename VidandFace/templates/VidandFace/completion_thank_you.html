{% extends "VidandFace/base.html" %}

{% block title %}Thank you{% endblock %}

{% block main_class %}mx-auto w-full max-w-3xl px-6 py-8{% endblock %}

{% block content %}
  <div class="rounded-2xl border border-neutral-200 bg-white p-8 shadow-sm dark:border-neutral-700 dark:bg-neutral-800">
    <h1 class="text-2xl font-semibold tracking-tight text-neutral-900 dark:text-neutral-100">Thank you!</h1>
    <p class="mt-2 text-sm text-neutral-600 dark:text-neutral-400">Your participation is complete.</p>

    <div class="mt-8 grid place-items-center rounded-2xl border border-dashed border-neutral-300 bg-neutral-50 p-10 dark:border-neutral-700 dark:bg-neutral-900/30">
      <div id="lottie-container" class="h-64 w-64"></div>
      <p class="mt-4 text-xs text-neutral-500 dark:text-neutral-400">Add your Lottie animation here.</p>
    </div>
  </div>
{% endblock %}
